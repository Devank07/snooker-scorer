<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snooker Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: radial-gradient(ellipse at center, #0f2d1a 0%, #060f0a 100%);
  color: #e8f4e0;
  font-family: 'Barlow Condensed', sans-serif;
  width: 100vw; height: 100vh;
  overflow: hidden;
}
body::before {
  content:''; position:fixed; inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.008) 2px,rgba(255,255,255,0.008) 4px),
    repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(255,255,255,0.004) 2px,rgba(255,255,255,0.004) 4px);
  pointer-events:none;
}

/* ============================================================
   OVERVIEW MODE (no ?table param) — all 6 tables grid
   ============================================================ */
#overview {
  display: none;
  flex-direction: column;
  height: 100vh;
  padding: 0;
}

.ov-header {
  background: rgba(0,0,0,0.5);
  border-bottom: 2px solid #c9a227;
  padding: 12px 28px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.ov-title { font-family:'Bebas Neue',cursive; font-size:1.8rem; letter-spacing:5px; color:#c9a227; }
.ov-tournament { font-size:0.9rem; color:rgba(232,244,224,0.6); letter-spacing:2px; }
.live-pip { display:flex; align-items:center; gap:6px; font-size:0.75rem; color:#e74c3c; letter-spacing:2px; }
.live-pip::before { content:''; width:8px; height:8px; border-radius:50%; background:#e74c3c; animation:blink 1.2s infinite; }
@keyframes blink {0%,100%{opacity:1}50%{opacity:0.2}}

.ov-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 2px;
  background: rgba(0,0,0,0.3);
  overflow: hidden;
}

.table-tile {
  background: #0a1f12;
  display: flex; flex-direction: column;
  padding: 16px 20px;
  position: relative;
  overflow: hidden;
  transition: background 0.3s;
}
.table-tile.active { background: #0d2418; }
.table-tile::before {
  content: '';
  position: absolute; top:0; left:0; right:0; height: 3px;
  background: linear-gradient(90deg, transparent, rgba(201,162,39,0.4), transparent);
  opacity: 0;
}
.table-tile.active::before { opacity: 1; }

.tile-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.tile-table-num {
  font-family:'Bebas Neue',cursive; font-size:0.9rem; letter-spacing:3px;
  color:rgba(201,162,39,0.6);
}
.tile-table-num.active-num { color:#c9a227; }
.tile-status {
  font-size:0.6rem; letter-spacing:1px; text-transform:uppercase;
  color:rgba(232,244,224,0.25); font-weight:bold;
}
.tile-status.live { color:#2ecc71; }

/* Empty tile */
.tile-empty {
  flex: 1; display:flex; align-items:center; justify-content:center;
  color:rgba(232,244,224,0.1); font-size:0.85rem; letter-spacing:2px;
  text-transform: uppercase;
}

/* Active tile scores */
.tile-scores {
  display: none;
  flex: 1;
  flex-direction: column;
  justify-content: center;
  gap: 6px;
}
.tile-player-row {
  display: flex; align-items: center; gap: 8px;
}
.tile-player-row.at-table .tile-pname { color:#c9a227; }
.tile-player-row.at-table .tile-arrow { opacity:1; }
.tile-arrow { font-size:0.7rem; color:#c9a227; opacity:0; transition:opacity 0.2s; width:10px; }
.tile-pname {
  flex:1; font-family:'Bebas Neue',cursive; font-size:clamp(1rem,2.2vw,1.6rem);
  letter-spacing:2px; color:#e8f4e0;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.tile-frames {
  font-family:'Bebas Neue',cursive; font-size:clamp(1.8rem,4vw,3rem);
  color:#c9a227; line-height:1; min-width:40px; text-align:center;
}
.tile-pts {
  font-size:clamp(0.8rem,1.5vw,1.1rem); color:rgba(232,244,224,0.6);
  min-width:45px; text-align:right; font-weight:300;
}
.tile-divider {
  display:flex; justify-content:center; align-items:center;
}
.tile-div-line {
  flex:1; height:1px; background:rgba(255,255,255,0.06);
}
.tile-vs-label {
  font-size:0.6rem; color:rgba(255,255,255,0.12); padding:0 8px; letter-spacing:1px;
}
.tile-footer {
  margin-top:8px;
  display:flex; justify-content:space-between; align-items:center;
}
.tile-frame-label { font-size:0.65rem; color:rgba(232,244,224,0.35); letter-spacing:1px; }
.tile-break { font-size:0.7rem; font-weight:bold; color:white; }
.tile-break span { color:rgba(232,244,224,0.35); font-weight:normal; }

/* ============================================================
   SINGLE TABLE MODE (?table=N)
   ============================================================ */
#single {
  display: none;
  flex-direction: column;
  height: 100vh;
}

.top-bar {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 24px;
  border-bottom:1px solid rgba(201,162,39,0.25);
  background:rgba(0,0,0,0.35);
  flex-shrink:0;
}
.top-tournament { font-family:'Bebas Neue',cursive; font-size:clamp(1rem,2.5vw,1.6rem); letter-spacing:4px; color:#c9a227; }
.top-frame { font-size:clamp(0.65rem,1.5vw,0.9rem); color:rgba(232,244,224,0.5); letter-spacing:2px; text-transform:uppercase; }
.top-table-badge {
  font-family:'Bebas Neue',cursive; font-size:0.9rem; letter-spacing:3px;
  color:rgba(201,162,39,0.6); background:rgba(201,162,39,0.08);
  border:1px solid rgba(201,162,39,0.25); padding:4px 14px; border-radius:20px;
}

.main-scores {
  display:grid; grid-template-columns:1fr 160px 1fr;
  align-items:center; padding:20px 24px;
  flex:1; gap:12px;
}
.player-block { display:flex; flex-direction:column; gap:6px; }
.player-block.left { text-align:left; }
.player-block.right { text-align:right; }
.player-name {
  font-family:'Bebas Neue',cursive; font-size:clamp(2rem,5vw,3.8rem);
  letter-spacing:3px; line-height:1; color:#e8f4e0;
}
.player-name.active { color:#f0c040; text-shadow:0 0 30px rgba(240,192,64,0.4); }
.turn-arrow { font-size:1.4rem; transition:opacity 0.3s; }
.frame-score {
  font-family:'Bebas Neue',cursive; font-size:clamp(4rem,10vw,7rem);
  line-height:1; color:#c9a227; text-shadow:0 0 50px rgba(201,162,39,0.35);
}
.pts-score {
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(1.4rem,3.5vw,2.8rem); font-weight:300; color:#e8f4e0;
}
.frame-dots { display:flex; gap:5px; margin-top:3px; }
.player-block.right .frame-dots { justify-content:flex-end; }
.frame-dot { width:11px; height:11px; border-radius:50%; border:2px solid rgba(201,162,39,0.35); background:transparent; transition:background 0.3s; }
.frame-dot.won { background:#c9a227; border-color:#c9a227; }

.vs-center { display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center; }
.vs-label { font-size:0.65rem; color:rgba(232,244,224,0.4); letter-spacing:2px; text-transform:uppercase; }
.vs-dash { font-family:'Bebas Neue',cursive; font-size:clamp(2.5rem,5vw,4rem); color:rgba(255,255,255,0.12); line-height:1; }

.break-section {
  padding:10px 24px;
  background:rgba(0,0,0,0.3);
  border-top:1px solid rgba(255,255,255,0.04);
  display:flex; align-items:center; justify-content:center; gap:20px;
  flex-shrink:0; transition:opacity 0.3s; position:relative;
}
#century-glow {
  position:absolute; inset:0;
  background:radial-gradient(ellipse at center,rgba(201,162,39,0.13),transparent 70%);
  pointer-events:none; opacity:0; transition:opacity 0.5s;
  animation:cpulse 1.5s ease-in-out infinite;
}
@keyframes cpulse{0%,100%{opacity:0.7}50%{opacity:0.3}}
.break-label-text { font-size:0.7rem; color:rgba(232,244,224,0.4); letter-spacing:2px; text-transform:uppercase; text-align:center; }
#break-player-name { display:block; font-size:0.85rem; color:#c9a227; margin-bottom:1px; }
.break-val { font-family:'Bebas Neue',cursive; font-size:clamp(2.5rem,6vw,5rem); color:white; line-height:1; text-shadow:0 0 25px rgba(255,255,255,0.25); }
#break-balls { display:flex; flex-wrap:wrap; gap:5px; max-width:280px; justify-content:center; }
.ball { width:clamp(24px,3.2vw,34px); height:clamp(24px,3.2vw,34px); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:clamp(0.55rem,0.9vw,0.7rem); font-weight:bold; color:white; box-shadow:0 2px 8px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.18); position:relative; overflow:hidden; flex-shrink:0; }
.ball::after{content:'';position:absolute;top:15%;left:20%;width:35%;height:25%;background:rgba(255,255,255,0.22);border-radius:50%;transform:rotate(-30deg);}
.ball span{position:relative;z-index:1;}
.ball-red{background:radial-gradient(circle at 35% 35%,#e74c3c,#7b241c);}
.ball-yellow{background:radial-gradient(circle at 35% 35%,#f7dc6f,#b7950b);color:#333;}
.ball-green{background:radial-gradient(circle at 35% 35%,#52be80,#1e6e3a);}
.ball-brown{background:radial-gradient(circle at 35% 35%,#a0714f,#5d4037);}
.ball-blue{background:radial-gradient(circle at 35% 35%,#5dade2,#1a5276);}
.ball-pink{background:radial-gradient(circle at 35% 35%,#f06292,#b71c5d);}
.ball-black{background:radial-gradient(circle at 35% 35%,#4a4a4a,#0a0a0a);border:1px solid #444;}

.bottom-bar {
  padding:8px 24px;
  display:flex; align-items:center; justify-content:space-between;
  border-top:1px solid rgba(201,162,39,0.15);
  background:rgba(0,0,0,0.4); flex-shrink:0;
}
#reds-dots { display:flex; gap:3px; flex-wrap:wrap; max-width:180px; }
.red-dot { width:9px; height:9px; border-radius:50%; transition:all 0.3s; }
.red-on { background:#c0392b; box-shadow:0 0 5px rgba(192,57,43,0.5); }
.red-off { background:rgba(255,255,255,0.08); }
#reds-count { font-size:0.62rem; color:rgba(232,244,224,0.35); letter-spacing:1px; margin-top:2px; }

/* Winner overlay */
#winner-overlay {
  display:none; position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,0.88);
  flex-direction:column; align-items:center; justify-content:center; gap:20px; text-align:center;
}
.winner-label { font-family:'Bebas Neue',cursive; font-size:1.3rem; color:#c9a227; letter-spacing:4px; }
.winner-name { font-family:'Bebas Neue',cursive; font-size:clamp(4rem,10vw,7rem); color:white; letter-spacing:5px; text-shadow:0 0 70px rgba(201,162,39,0.7); }
.winner-sub { font-family:'Bebas Neue',cursive; font-size:1.8rem; color:#c9a227; letter-spacing:3px; }
.trophy { font-size:4rem; animation:tbounce 1s ease-in-out infinite; }
@keyframes tbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#confetti { display:none; position:fixed; inset:0; pointer-events:none; z-index:99; }
</style>
</head>
<body>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAxNVCaOyZvk69fqR-qTCyjbvE1gAbiBXE",
  authDomain: "snooker-scorer-56573.firebaseapp.com",
  databaseURL: "https://snooker-scorer-56573-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "snooker-scorer-56573",
  storageBucket: "snooker-scorer-56573.firebasestorage.app",
  messagingSenderId: "774218957368",
  appId: "1:774218957368:web:3b2c9cc363c0627ab35ccd"
});
const db = firebase.database();
const params = new URLSearchParams(window.location.search);
const tableNum = params.get('table');

if (tableNum) {
  // ---- SINGLE TABLE MODE ----
  document.getElementById('single').style.display = 'flex';
  document.getElementById('overview').style.display = 'none';
  document.title = 'Table ' + tableNum + ' · Scoreboard';
  document.getElementById('single-table-badge').textContent = 'Table ' + tableNum;

  let prevBreak = 0;
  db.ref('matches/table-' + tableNum).on('value', snap => {
    const s = snap.val();
    if (!s) {
      document.getElementById('single-waiting').style.display = 'flex';
      document.getElementById('single-scores').style.display = 'none';
      return;
    }
    document.getElementById('single-waiting').style.display = 'none';
    document.getElementById('single-scores').style.display = 'flex';
    renderSingle(s, prevBreak);
    prevBreak = s.currentBreak || 0;
  });

} else {
  // ---- OVERVIEW MODE ----
  document.getElementById('overview').style.display = 'flex';
  document.getElementById('single').style.display = 'none';
  document.title = 'Tournament Overview · Snooker';

  db.ref('tournament').on('value', snap => {
    document.getElementById('ov-tournament').textContent = snap.val() || 'Snooker Tournament';
  });

  [1,2,3,4,5,6].forEach(n => {
    db.ref('matches/table-' + n).on('value', snap => {
      renderTile(n, snap.val());
    });
  });
}

function renderSingle(s, prevBreak) {
  document.getElementById('single-tournament').textContent = s.tournament || 'Snooker';
  document.getElementById('single-frame-label').textContent = 'Frame ' + s.currentFrame + ' of ' + s.bestOf;
  document.getElementById('p1-name').textContent = s.player1.name;
  document.getElementById('p2-name').textContent = s.player2.name;
  document.getElementById('p1-name').className = 'player-name' + (s.turn===1?' active':'');
  document.getElementById('p2-name').className = 'player-name' + (s.turn===2?' active':'');
  document.getElementById('p1-frame-score').textContent = s.player1.frames;
  document.getElementById('p2-frame-score').textContent = s.player2.frames;
  document.getElementById('p1-pts').textContent = s.player1.score;
  document.getElementById('p2-pts').textContent = s.player2.score;
  document.getElementById('p1-turn').style.opacity = s.turn===1?'1':'0.08';
  document.getElementById('p2-turn').style.opacity = s.turn===2?'1':'0.08';

  const brk = s.currentBreak || 0;
  document.getElementById('break-value').textContent = brk;
  document.getElementById('break-section').style.opacity = brk > 0 ? '1' : '0.3';
  document.getElementById('break-player-name').textContent = brk > 0
    ? (s.breakPlayer===1 ? s.player1.name : s.player2.name) + "'s Break" : 'Break';
  document.getElementById('century-glow').style.opacity = brk >= 100 ? '1' : '0';
  document.getElementById('break-balls').innerHTML = (s.breakBalls||[]).slice(-12).map(b =>
    '<div class="ball ball-'+b.color+'"><span>'+b.value+'</span></div>').join('');

  const reds = Math.max(0, s.redsRemaining ?? 15);
  let rdots = '';
  for(let i=0;i<15;i++) rdots += '<div class="red-dot '+(i<reds?'red-on':'red-off')+'"></div>';
  document.getElementById('reds-dots').innerHTML = rdots;
  document.getElementById('reds-count').textContent = reds + ' reds remaining';

  const needed = Math.ceil(s.bestOf/2);
  let p1d='', p2d='';
  for(let i=0;i<needed;i++){
    p1d += '<div class="frame-dot'+(i<s.player1.frames?' won':'')+'"></div>';
    p2d += '<div class="frame-dot'+(i<s.player2.frames?' won':'')+'"></div>';
  }
  document.getElementById('p1-dots').innerHTML = p1d;
  document.getElementById('p2-dots').innerHTML = p2d;

  if (s.matchWinner) {
    document.getElementById('single-winner-name').textContent = s['player'+s.matchWinner].name;
    document.getElementById('winner-overlay').style.display = 'flex';
    startConfetti();
  } else {
    document.getElementById('winner-overlay').style.display = 'none';
  }
}

function renderTile(n, s) {
  const tile = document.getElementById('tile-'+n);
  const numEl = document.getElementById('tile-num-'+n);
  const statusEl = document.getElementById('tile-status-'+n);
  const emptyEl = document.getElementById('tile-empty-'+n);
  const scoresEl = document.getElementById('tile-scores-'+n);

  if (s && s.status === 'active') {
    tile.className = 'table-tile active';
    numEl.className = 'tile-table-num active-num';
    statusEl.className = 'tile-status live';
    statusEl.textContent = '● LIVE';
    emptyEl.style.display = 'none';
    scoresEl.style.display = 'flex';

    document.getElementById('tp1n-'+n).textContent = s.player1.name;
    document.getElementById('tp2n-'+n).textContent = s.player2.name;
    document.getElementById('tp1f-'+n).textContent = s.player1.frames;
    document.getElementById('tp2f-'+n).textContent = s.player2.frames;
    document.getElementById('tp1p-'+n).textContent = s.player1.score;
    document.getElementById('tp2p-'+n).textContent = s.player2.score;
    document.getElementById('tp1r-'+n).className = 'tile-player-row' + (s.turn===1?' at-table':'');
    document.getElementById('tp2r-'+n).className = 'tile-player-row' + (s.turn===2?' at-table':'');
    const brk = s.currentBreak||0;
    document.getElementById('tbreak-'+n).innerHTML = brk>0 ? '<span>Break: </span>'+brk : '';
    document.getElementById('tframe-'+n).textContent = 'Frame '+s.currentFrame+' · Best of '+s.bestOf;
  } else {
    tile.className = 'table-tile';
    numEl.className = 'tile-table-num';
    statusEl.className = 'tile-status';
    statusEl.textContent = 'AVAILABLE';
    emptyEl.style.display = 'flex';
    scoresEl.style.display = 'none';
  }
}

function startConfetti() {
  const canvas = document.getElementById('confetti');
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const parts = Array.from({length:100},()=>({
    x:Math.random()*canvas.width, y:Math.random()*-canvas.height,
    w:Math.random()*10+4, h:Math.random()*5+3,
    color:['#c9a227','#c0392b','#27ae60','#2980b9','#e91e8c','#f1c40f'][Math.floor(Math.random()*6)],
    speed:Math.random()*3+1, angle:Math.random()*360, spin:(Math.random()-0.5)*4
  }));
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    parts.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle*Math.PI/180);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      p.y+=p.speed;p.angle+=p.spin;if(p.y>canvas.height)p.y=-20;
    });
    requestAnimationFrame(draw);
  }
  draw();
}
</script>

<!-- ==================== SINGLE TABLE MODE ==================== -->
<div id="single">
  <!-- Waiting state -->
  <div id="single-waiting" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;text-align:center;padding:24px">
    <div style="font-size:3rem;animation:tbounce 2s infinite">🎱</div>
    <div style="font-family:'Bebas Neue',cursive;font-size:2.5rem;letter-spacing:4px;color:#c9a227">Awaiting Match</div>
    <div style="font-size:0.8rem;color:rgba(232,244,224,0.3);letter-spacing:2px">Table <span id="single-table-badge">–</span></div>
  </div>

  <div id="single-scores" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div class="top-bar">
      <div class="top-tournament" id="single-tournament">Snooker</div>
      <div class="top-frame" id="single-frame-label">Frame 1</div>
      <div class="top-table-badge" id="single-table-badge-2"></div>
    </div>

    <div class="main-scores">
      <div class="player-block left">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="turn-arrow" id="p1-turn">▶</div>
          <div class="player-name" id="p1-name">Player 1</div>
        </div>
        <div class="pts-score" id="p1-pts">0</div>
        <div class="frame-dots" id="p1-dots"></div>
      </div>

      <div class="vs-center">
        <div class="vs-label">Frames</div>
        <div style="display:flex;align-items:center;gap:2px">
          <div class="frame-score" id="p1-frame-score">0</div>
          <div class="vs-dash">–</div>
          <div class="frame-score" id="p2-frame-score">0</div>
        </div>
        <div class="vs-label">Points</div>
      </div>

      <div class="player-block right">
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px">
          <div class="player-name" id="p2-name">Player 2</div>
          <div class="turn-arrow" id="p2-turn">◀</div>
        </div>
        <div class="pts-score" id="p2-pts">0</div>
        <div class="frame-dots" id="p2-dots" style="justify-content:flex-end"></div>
      </div>
    </div>

    <div class="break-section" id="break-section">
      <div id="century-glow"></div>
      <div>
        <div class="break-label-text"><span id="break-player-name">Break</span>Current Break</div>
      </div>
      <div class="break-val" id="break-value">0</div>
      <div id="break-balls"></div>
    </div>

    <div class="bottom-bar">
      <div>
        <div id="reds-dots"></div>
        <div id="reds-count">15 reds remaining</div>
      </div>
      <div style="font-family:'Bebas Neue',cursive;font-size:0.85rem;letter-spacing:3px;color:rgba(201,162,39,0.3)">Snooker Scorer</div>
    </div>
  </div>

  <!-- Winner overlay -->
  <div id="winner-overlay">
    <div class="trophy">🏆</div>
    <div class="winner-label">Match Winner</div>
    <div class="winner-name" id="single-winner-name">–</div>
    <div class="winner-sub">Wins the Match</div>
  </div>
  <canvas id="confetti"></canvas>
</div>

<script>
  // Set table badge in single mode
  if (tableNum) {
    const el = document.getElementById('single-table-badge-2');
    if (el) el.textContent = 'Table ' + tableNum;
  }
</script>
</body>
</html>
