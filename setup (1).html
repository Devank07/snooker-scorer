<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snooker Tournament — Table Manager</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #07120d;
  background-image: radial-gradient(ellipse at 50% 0%, #0f2a1a 0%, #07120d 70%);
  min-height: 100vh;
  color: #e8f4e0;
  font-family: Arial, sans-serif;
  padding: 0 0 60px;
}

/* Top bar */
.topbar {
  background: rgba(0,0,0,0.5);
  border-bottom: 2px solid #c9a227;
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.topbar-logo {
  font-size: 1.5rem;
  font-weight: 900;
  color: #c9a227;
  letter-spacing: 3px;
  text-transform: uppercase;
}
.topbar-logo span { color: rgba(232,244,224,0.5); font-size: 0.75rem; display: block; letter-spacing: 2px; font-weight: normal; margin-top: 2px; }
.tournament-display {
  font-size: 1rem;
  color: rgba(232,244,224,0.7);
  letter-spacing: 1px;
  text-align: center;
}
.edit-tournament-btn {
  background: rgba(201,162,39,0.1);
  border: 1px solid rgba(201,162,39,0.3);
  color: #c9a227;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  letter-spacing: 1px;
  font-weight: bold;
}
.edit-tournament-btn:hover { background: rgba(201,162,39,0.2); }

/* Tournament edit panel */
#tournament-panel {
  display: none;
  background: #0d2018;
  border-bottom: 1px solid rgba(201,162,39,0.2);
  padding: 16px 28px;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}
#tournament-panel input {
  flex: 1; min-width: 200px;
  padding: 10px 14px;
  background: #122a1c;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #e8f4e0;
  font-size: 0.95rem;
}
#tournament-panel input:focus { outline: none; border-color: #c9a227; }
#tournament-panel button {
  padding: 10px 20px;
  background: linear-gradient(135deg, #1c3f1c, #0d2318);
  color: #c9a227;
  border: 1px solid #c9a227;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  font-size: 0.9rem;
}

/* Main content */
.main { padding: 28px; max-width: 1300px; margin: 0 auto; }

.section-title {
  font-size: 0.7rem;
  font-weight: bold;
  letter-spacing: 3px;
  color: #c9a227;
  text-transform: uppercase;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: rgba(201,162,39,0.2); }

/* Tables grid */
.tables-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}

/* Table card */
.table-card {
  background: #0d2018;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.table-card.active { border-color: rgba(201,162,39,0.4); }
.table-card.active .card-header { background: rgba(201,162,39,0.07); }

.card-header {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.02);
}
.table-label {
  font-size: 0.8rem;
  font-weight: bold;
  color: #c9a227;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.status-badge {
  font-size: 0.65rem;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 20px;
}
.status-badge.empty {
  background: rgba(255,255,255,0.06);
  color: rgba(232,244,224,0.35);
  border: 1px solid rgba(255,255,255,0.08);
}
.status-badge.live {
  background: rgba(39,174,96,0.15);
  color: #2ecc71;
  border: 1px solid rgba(39,174,96,0.35);
  animation: pulse-badge 2s ease-in-out infinite;
}
@keyframes pulse-badge { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* Live match scores */
.live-scores {
  padding: 16px 18px;
  display: none;
}
.match-players {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}
.match-player {
  flex: 1;
  text-align: center;
}
.match-player.at-table .mp-name { color: #c9a227; }
.mp-name {
  font-size: 0.85rem;
  font-weight: bold;
  color: #e8f4e0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 110px;
  margin: 0 auto;
}
.mp-frames {
  font-size: 2rem;
  font-weight: 900;
  color: #c9a227;
  line-height: 1;
  margin-top: 2px;
}
.mp-score {
  font-size: 0.9rem;
  color: rgba(232,244,224,0.6);
}
.match-vs {
  font-size: 1.2rem;
  color: rgba(255,255,255,0.15);
  font-weight: bold;
  padding: 0 4px;
}
.match-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.7rem;
  color: rgba(232,244,224,0.4);
  letter-spacing: 1px;
  margin-top: 4px;
  padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.break-indicator {
  font-size: 0.75rem;
  color: white;
  font-weight: bold;
}
.break-indicator span { color: rgba(232,244,224,0.4); font-weight: normal; }

/* Setup form (inside card) */
.setup-form {
  padding: 16px 18px;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
.form-row.single { grid-template-columns: 1fr; }
.field-label {
  font-size: 0.65rem;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(232,244,224,0.45);
  margin-bottom: 5px;
}
.field-input {
  width: 100%;
  padding: 10px 12px;
  background: #122a1c;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 7px;
  color: #e8f4e0;
  font-size: 0.9rem;
}
.field-input:focus { outline: none; border-color: #c9a227; }
.field-input::placeholder { color: rgba(232,244,224,0.2); }
select.field-input option { background: #122a1c; }

/* Card buttons */
.card-buttons {
  display: flex;
  gap: 8px;
  padding: 0 18px 16px;
}
.btn-start {
  flex: 1;
  padding: 11px;
  background: linear-gradient(135deg, #1c3f1c, #0d2318);
  color: #c9a227;
  border: 1.5px solid #c9a227;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
}
.btn-start:hover { background: linear-gradient(135deg, #265226, #122a1c); }
.btn-start:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-end {
  padding: 11px 16px;
  background: rgba(192,57,43,0.15);
  border: 1px solid rgba(192,57,43,0.45);
  color: #e74c3c;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: bold;
  cursor: pointer;
}
.btn-end:hover { background: rgba(192,57,43,0.28); }

/* Permanent links section inside card */
.card-links {
  border-top: 1px solid rgba(255,255,255,0.05);
  padding: 12px 18px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.perm-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  text-decoration: none;
  color: rgba(232,244,224,0.55);
  font-size: 0.7rem;
  letter-spacing: 1px;
  transition: border-color 0.2s, color 0.2s;
  cursor: pointer;
}
.perm-link:hover { border-color: #c9a227; color: #c9a227; }
.perm-link .pl-icon { font-size: 0.85rem; }

/* Global links section */
.global-links {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.global-link-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  background: #0d2018;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  text-decoration: none;
  color: #e8f4e0;
  transition: border-color 0.2s;
}
.global-link-card:hover { border-color: #c9a227; }
.gl-icon { font-size: 1.4rem; flex-shrink: 0; }
.gl-name { font-size: 0.95rem; font-weight: bold; }
.gl-desc { font-size: 0.72rem; color: rgba(232,244,224,0.4); margin-top: 2px; }
.gl-arrow { margin-left: auto; color: rgba(232,244,224,0.25); }

/* Copy toast */
#copy-toast {
  position: fixed;
  bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #1c3f1c;
  border: 1px solid #c9a227;
  color: #c9a227;
  padding: 10px 22px;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: bold;
  letter-spacing: 1px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 999;
}
#copy-toast.show { opacity: 1; }

footer { text-align: center; padding-top: 40px; font-size: 0.65rem; color: rgba(232,244,224,0.1); letter-spacing: 1px; }
</style>
</head>
<body>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAxNVCaOyZvk69fqR-qTCyjbvE1gAbiBXE",
  authDomain: "snooker-scorer-56573.firebaseapp.com",
  databaseURL: "https://snooker-scorer-56573-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "snooker-scorer-56573",
  storageBucket: "snooker-scorer-56573.firebasestorage.app",
  messagingSenderId: "774218957368",
  appId: "1:774218957368:web:3b2c9cc363c0627ab35ccd"
});
const db = firebase.database();

const TABLES = [1,2,3,4,5,6];
const BASE_URL = window.location.origin + window.location.pathname.replace('setup.html','');

// Load tournament name
db.ref('tournament').on('value', snap => {
  const name = snap.val() || 'Snooker Tournament';
  document.getElementById('tournament-display').textContent = name;
  document.getElementById('tournament-input').value = name;
});

function saveTournament() {
  const name = document.getElementById('tournament-input').value.trim();
  if (!name) return;
  db.ref('tournament').set(name);
  document.getElementById('tournament-panel').style.display = 'none';
}

function toggleTournamentPanel() {
  const p = document.getElementById('tournament-panel');
  p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
}

// Watch all tables
TABLES.forEach(n => {
  db.ref('matches/table-' + n).on('value', snap => {
    updateTableCard(n, snap.val());
  });
});

function updateTableCard(n, match) {
  const card = document.getElementById('card-' + n);
  const badge = document.getElementById('badge-' + n);
  const liveScores = document.getElementById('live-' + n);
  const setupForm = document.getElementById('form-' + n);
  const endBtn = document.getElementById('endbtn-' + n);
  const startBtn = document.getElementById('startbtn-' + n);

  if (match && match.status === 'active') {
    card.className = 'table-card active';
    badge.className = 'status-badge live';
    badge.textContent = '● LIVE';
    liveScores.style.display = 'block';
    setupForm.style.display = 'none';
    endBtn.style.display = 'block';
    startBtn.textContent = '↺ New Match';

    // Update scores
    document.getElementById('p1name-' + n).textContent = match.player1.name;
    document.getElementById('p2name-' + n).textContent = match.player2.name;
    document.getElementById('p1frames-' + n).textContent = match.player1.frames;
    document.getElementById('p2frames-' + n).textContent = match.player2.frames;
    document.getElementById('p1score-' + n).textContent = match.player1.score + ' pts';
    document.getElementById('p2score-' + n).textContent = match.player2.score + ' pts';

    const p1wrap = document.getElementById('p1wrap-' + n);
    const p2wrap = document.getElementById('p2wrap-' + n);
    p1wrap.className = 'match-player' + (match.turn === 1 ? ' at-table' : '');
    p2wrap.className = 'match-player' + (match.turn === 2 ? ' at-table' : '');

    const brk = match.currentBreak || 0;
    const brkEl = document.getElementById('break-' + n);
    brkEl.innerHTML = brk > 0
      ? '<span>Break: </span>' + brk
      : '';

    const frameEl = document.getElementById('frame-' + n);
    frameEl.textContent = 'Frame ' + match.currentFrame + ' · Best of ' + match.bestOf;
  } else {
    card.className = 'table-card';
    badge.className = 'status-badge empty';
    badge.textContent = 'AVAILABLE';
    liveScores.style.display = 'none';
    setupForm.style.display = 'block';
    endBtn.style.display = 'none';
    startBtn.textContent = '▶ Start Match';
  }
}

function startMatch(n) {
  const p1 = document.getElementById('p1-' + n).value.trim();
  const p2 = document.getElementById('p2-' + n).value.trim();
  const bestOf = parseInt(document.getElementById('bo-' + n).value);
  const breakFirst = parseInt(document.getElementById('bf-' + n).value);

  if (!p1 || !p2) { alert('Enter both player names for Table ' + n); return; }
  if (p1 === p2) { alert('Players must have different names.'); return; }

  const btn = document.getElementById('startbtn-' + n);
  btn.disabled = true; btn.textContent = 'Starting...';

  db.ref('matches/table-' + n).set({
    tableNumber: n,
    tournament: document.getElementById('tournament-display').textContent,
    bestOf, currentFrame: 1, status: 'active', matchWinner: null,
    turn: breakFirst, breakPlayer: breakFirst, currentBreak: 0,
    breakBalls: [], redsRemaining: 15, lastFoul: null,
    player1: { name: p1, frames: 0, score: 0 },
    player2: { name: p2, frames: 0, score: 0 }
  }).then(() => {
    btn.disabled = false;
  }).catch(e => {
    alert('Error: ' + e.message);
    btn.disabled = false; btn.textContent = '▶ Start Match';
  });
}

function endMatch(n) {
  if (!confirm('End match on Table ' + n + ' and clear scores?')) return;
  db.ref('matches/table-' + n).remove();
}

function copyLink(url, label) {
  navigator.clipboard.writeText(url).then(() => {
    const t = document.getElementById('copy-toast');
    t.textContent = '✔ Copied: ' + label;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}
</script>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-logo">
    🎱 Snooker Scorer
    <span>Tournament Manager</span>
  </div>
  <div class="tournament-display" id="tournament-display">Snooker Tournament</div>
  <button class="edit-tournament-btn" onclick="toggleTournamentPanel()">✏️ Edit Tournament Name</button>
</div>

<!-- Tournament edit panel -->
<div id="tournament-panel" style="display:none;display:none" class="topbar" style="border-top:1px solid rgba(201,162,39,0.15)">
  <input type="text" id="tournament-input" placeholder="Tournament name..." style="flex:1;padding:10px 14px;background:#122a1c;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e8f4e0;font-size:0.95rem;min-width:200px;">
  <button onclick="saveTournament()" style="padding:10px 20px;background:linear-gradient(135deg,#1c3f1c,#0d2318);color:#c9a227;border:1px solid #c9a227;border-radius:8px;cursor:pointer;font-weight:bold;">Save</button>
  <button onclick="toggleTournamentPanel()" style="padding:10px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;color:rgba(232,244,224,0.5);">Cancel</button>
</div>

<div class="main">

  <!-- Tables grid -->
  <div class="section-title">Live Tables</div>
  <div class="tables-grid" id="tables-grid">

    <!-- Table cards generated by JS -->
    <script>
      TABLES.forEach(n => {
        const base = BASE_URL;
        document.write(`
        <div class="table-card" id="card-${n}">
          <div class="card-header">
            <div class="table-label">Table ${n}</div>
            <div class="status-badge empty" id="badge-${n}">AVAILABLE</div>
          </div>

          <!-- Live scores (shown when match active) -->
          <div class="live-scores" id="live-${n}">
            <div class="match-players">
              <div class="match-player" id="p1wrap-${n}">
                <div class="mp-name" id="p1name-${n}">–</div>
                <div class="mp-frames" id="p1frames-${n}">0</div>
                <div class="mp-score" id="p1score-${n}">0 pts</div>
              </div>
              <div class="match-vs">–</div>
              <div class="match-player" id="p2wrap-${n}">
                <div class="mp-name" id="p2name-${n}">–</div>
                <div class="mp-frames" id="p2frames-${n}">0</div>
                <div class="mp-score" id="p2score-${n}">0 pts</div>
              </div>
            </div>
            <div class="match-meta">
              <div id="frame-${n}">Frame 1</div>
              <div class="break-indicator" id="break-${n}"></div>
            </div>
          </div>

          <!-- Setup form (shown when no match) -->
          <div class="setup-form" id="form-${n}">
            <div class="form-row">
              <div>
                <div class="field-label">Player 1</div>
                <input class="field-input" type="text" id="p1-${n}" placeholder="Player 1 name">
              </div>
              <div>
                <div class="field-label">Player 2</div>
                <input class="field-input" type="text" id="p2-${n}" placeholder="Player 2 name">
              </div>
            </div>
            <div class="form-row">
              <div>
                <div class="field-label">Format</div>
                <select class="field-input" id="bo-${n}">
                  <option value="1">Single Frame</option>
                  <option value="3">Best of 3</option>
                  <option value="5">Best of 5</option>
                  <option value="7">Best of 7</option>
                  <option value="9" selected>Best of 9</option>
                  <option value="11">Best of 11</option>
                  <option value="13">Best of 13</option>
                  <option value="17">Best of 17</option>
                  <option value="19">Best of 19</option>
                </select>
              </div>
              <div>
                <div class="field-label">Breaks First</div>
                <select class="field-input" id="bf-${n}">
                  <option value="1">Player 1</option>
                  <option value="2">Player 2</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Buttons -->
          <div class="card-buttons">
            <button class="btn-start" id="startbtn-${n}" onclick="startMatch(${n})">▶ Start Match</button>
            <button class="btn-end" id="endbtn-${n}" onclick="endMatch(${n})" style="display:none">End</button>
          </div>

          <!-- Permanent links -->
          <div class="card-links">
            <a class="perm-link" href="${base}referee.html?table=${n}" target="_blank"><span class="pl-icon">📱</span> Referee</a>
            <a class="perm-link" href="${base}scoreboard.html?table=${n}" target="_blank"><span class="pl-icon">📺</span> Scoreboard</a>
            <span class="perm-link" onclick="copyLink('${base}overlay.html?table=${n}', 'OBS T${n}')"><span class="pl-icon">🎥</span> Copy OBS Link</span>
          </div>
        </div>
        `);
      });
    </script>
  </div>

  <!-- Global links -->
  <div class="section-title">Global Screens</div>
  <div class="global-links">
    <a class="global-link-card" href="scoreboard.html" target="_blank">
      <span class="gl-icon">🏆</span>
      <div>
        <div class="gl-name">All Tables Overview</div>
        <div class="gl-desc">All 6 tables on one screen · for tournament display or stream</div>
      </div>
      <span class="gl-arrow">↗</span>
    </a>
  </div>

</div>

<div id="copy-toast">Copied!</div>
<footer>Snooker Scoring System · Multi-Table Edition</footer>
</body>
</html>
