<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snooker OBS Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAxNVCaOyZvk69fqR-qTCyjbvE1gAbiBXE",
    authDomain: "snooker-scorer-56573.firebaseapp.com",
    databaseURL: "https://snooker-scorer-56573-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "snooker-scorer-56573",
    storageBucket: "snooker-scorer-56573.firebasestorage.app",
    messagingSenderId: "774218957368",
    appId: "1:774218957368:web:3b2c9cc363c0627ab35ccd"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let prevBreak = 0;

  onValue(ref(db, 'match'), snap => {
    const s = snap.val();
    if (!s) { document.getElementById('overlay').style.opacity = '0'; return; }
    document.getElementById('overlay').style.opacity = '1';

    document.getElementById('tournament').textContent = s.tournament || '';
    document.getElementById('frame-num').textContent = `Frame ${s.currentFrame}`;
    document.getElementById('best-of').textContent = `Best of ${s.bestOf}`;

    document.getElementById('p1-name').textContent = s.player1.name;
    document.getElementById('p2-name').textContent = s.player2.name;
    document.getElementById('p1-frames').textContent = s.player1.frames;
    document.getElementById('p2-frames').textContent = s.player2.frames;
    document.getElementById('p1-score').textContent = s.player1.score;
    document.getElementById('p2-score').textContent = s.player2.score;

    // Active player
    document.getElementById('p1-row').classList.toggle('at-table', s.turn === 1);
    document.getElementById('p2-row').classList.toggle('at-table', s.turn === 2);

    // Break
    const brk = s.currentBreak || 0;
    document.getElementById('break-val').textContent = brk;
    const bName = s.breakPlayer === 1 ? s.player1.name : s.player2.name;
    document.getElementById('break-who').textContent = bName;
    document.getElementById('break-box').style.display = brk > 0 ? 'flex' : 'none';

    // Century flash
    if (brk >= 100 && prevBreak < 100) {
      document.getElementById('century-flash').classList.add('show');
      setTimeout(() => document.getElementById('century-flash').classList.remove('show'), 3000);
    }
    prevBreak = brk;
  });
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* TRANSPARENT BACKGROUND — critical for OBS */
  html, body {
    background: transparent !important;
    width: 1920px; height: 1080px;
    overflow: hidden;
    font-family: 'Barlow Condensed', sans-serif;
  }

  #overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 40px 30px;
    transition: opacity 0.5s;
  }

  /* Main score bar — bottom of screen */
  .score-bar {
    display: flex;
    align-items: stretch;
    height: 90px;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  .player-section {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 0;
    background: rgba(8, 22, 12, 0.92);
    backdrop-filter: blur(8px);
    padding: 0 24px;
    position: relative;
    transition: background 0.3s;
  }
  .player-section.at-table {
    background: rgba(14, 38, 22, 0.96);
  }
  .player-section.at-table::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #c9a227, transparent);
  }

  .p-name {
    font-family: 'Bebas Neue', cursive;
    font-size: 2.2rem;
    letter-spacing: 3px;
    color: #e8f4e0;
    flex: 1;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }
  .at-table .p-name { color: #f0c040; }

  .p-frame {
    font-family: 'Bebas Neue', cursive;
    font-size: 3.5rem;
    color: #c9a227;
    line-height: 1;
    min-width: 50px;
    text-align: center;
  }

  .p-pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.6rem;
    font-weight: 300;
    color: rgba(240,236,224,0.75);
    min-width: 60px;
    text-align: center;
    padding-left: 12px;
    border-left: 1px solid rgba(255,255,255,0.1);
    margin-left: 12px;
  }

  /* Center divider */
  .center-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(32,97,201,0.7);
    backdrop-filter: blur(8px);
    padding: 0 20px;
    min-width: 140px;
    gap: 2px;
    border-left: 1px solid rgba(201,162,39,0.2);
    border-right: 1px solid rgba(201,162,39,0.2);
  }
  .tournament-label {
    font-family: 'Bebas Neue', cursive;
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: #c9a227;
    text-align: center;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .frame-label {
    font-size: 0.7rem;
    color: rgba(240,236,224,0.5);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .vs-divider {
    font-family: 'Bebas Neue', cursive;
    font-size: 2rem;
    color: rgba(255,255,255,0.2);
  }

  /* Break box — appears above score bar */
  #break-box {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 12px;
    background: rgba(6, 18, 10, 0.88);
    backdrop-filter: blur(8px);
    border-radius: 6px;
    padding: 10px 24px;
    border-top: 2px solid #c9a227;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .break-who-text {
    font-size: 0.75rem;
    color: rgba(201,162,39,0.8);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
  }
  .break-number {
    font-family: 'Bebas Neue', cursive;
    font-size: 3.5rem;
    color: white;
    line-height: 1;
  }
  .break-word {
    font-size: 0.7rem;
    color: rgba(240,236,224,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Century flash */
  #century-flash {
    position: absolute;
    bottom: 140px;
    left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #1a0f00, #3d2800);
    border: 2px solid #c9a227;
    border-radius: 8px;
    padding: 12px 32px;
    text-align: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s;
    white-space: nowrap;
    box-shadow: 0 0 40px rgba(201,162,39,0.5);
  }
  #century-flash.show { opacity: 1; }
  #century-flash .c-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 2rem;
    color: #c9a227;
    letter-spacing: 4px;
  }
  #century-flash .c-name {
    font-size: 1rem;
    color: rgba(240,236,224,0.8);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="overlay" style="opacity:0">

  <!-- Century Flash -->
  <div id="century-flash">
    <div class="c-title">🎱 CENTURY BREAK!</div>
    <div class="c-name" id="century-who"></div>
  </div>

  <!-- Break display -->
  <div id="break-box">
    <div>
      <div class="break-who-text" id="break-who">Player</div>
      <div class="break-word">Break</div>
    </div>
    <div class="break-number" id="break-val">0</div>
  </div>

  <!-- Score bar -->
  <div class="score-bar">

    <!-- Player 1 -->
    <div class="player-section" id="p1-row">
      <div class="p-name" id="p1-name">Player 1</div>
      <div class="p-frame" id="p1-frames">0</div>
      <div class="p-pts" id="p1-score">0</div>
    </div>

    <!-- Center -->
    <div class="center-block">
      <div class="tournament-label" id="tournament">Tournament</div>
      <div class="vs-divider">VS</div>
      <div class="frame-label"><span id="frame-num">Frame 1</span></div>
      <div class="frame-label" id="best-of" style="color:rgba(201,162,39,0.5)">Best of 9</div>
    </div>

    <!-- Player 2 -->
    <div class="player-section" id="p2-row" style="flex-direction:row-reverse">
      <div class="p-name" id="p2-name" style="text-align:right">Player 2</div>
      <div class="p-frame" id="p2-frames">0</div>
      <div class="p-pts" id="p2-score" style="border-left:none;border-right:1px solid rgba(255,255,255,0.1);margin-left:0;margin-right:12px;padding-left:0;padding-right:12px">0</div>
    </div>

  </div>
</div>

</body>
</html>
