<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snooker Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAxNVCaOyZvk69fqR-qTCyjbvE1gAbiBXE",
    authDomain: "snooker-scorer-56573.firebaseapp.com",
    databaseURL: "https://snooker-scorer-56573-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "snooker-scorer-56573",
    storageBucket: "snooker-scorer-56573.firebasestorage.app",
    messagingSenderId: "774218957368",
    appId: "1:774218957368:web:3b2c9cc363c0627ab35ccd"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  onValue(ref(db, 'match'), snap => {
    const s = snap.val();
    if (!s) { showWaiting(); return; }
    renderScoreboard(s);
  });

  function showWaiting() {
    document.getElementById('waiting').style.display = 'flex';
    document.getElementById('scoreboard').style.display = 'none';
  }

  function renderScoreboard(s) {
    document.getElementById('waiting').style.display = 'none';
    document.getElementById('scoreboard').style.display = 'grid';

    document.getElementById('tournament').textContent = s.tournament || 'Snooker';
    document.getElementById('frame-label').textContent = `Frame ${s.currentFrame} of ${s.bestOf}`;

    // Players
    document.getElementById('p1-name').textContent = s.player1.name;
    document.getElementById('p2-name').textContent = s.player2.name;
    document.getElementById('p1-frame-score').textContent = s.player1.frames;
    document.getElementById('p2-frame-score').textContent = s.player2.frames;
    document.getElementById('p1-pts').textContent = s.player1.score;
    document.getElementById('p2-pts').textContent = s.player2.score;

    // Turn indicators
    document.getElementById('p1-turn').style.opacity = s.turn === 1 ? '1' : '0.1';
    document.getElementById('p2-turn').style.opacity = s.turn === 2 ? '1' : '0.1';

    // Break
    const breakVal = s.currentBreak || 0;
    document.getElementById('break-value').textContent = breakVal;
    const bpName = s.breakPlayer === 1 ? s.player1.name : s.player2.name;
    document.getElementById('break-label-name').textContent = breakVal > 0 ? `${bpName}'s Break` : 'Break';
    document.getElementById('break-display').style.opacity = breakVal > 0 ? '1' : '0.35';
    // Century highlight
    document.getElementById('century-glow').style.opacity = breakVal >= 100 ? '1' : '0';

    // Break balls
    const balls = s.breakBalls || [];
    document.getElementById('break-balls').innerHTML = balls.slice(-12).map(b =>
      `<div class="ball ball-${b.color}"><span>${b.value}</span></div>`
    ).join('');

    // Reds remaining
    const reds = Math.max(0, s.redsRemaining ?? 15);
    let redsHtml = '';
    for (let i = 0; i < 15; i++) {
      redsHtml += `<div class="red-dot ${i < reds ? 'red-on' : 'red-off'}"></div>`;
    }
    document.getElementById('reds-dots').innerHTML = redsHtml;
    document.getElementById('reds-count').textContent = `${reds} reds remaining`;

    // Frame dots (won frames)
    const needed = Math.ceil(s.bestOf / 2);
    let p1dots = '', p2dots = '';
    for (let i = 0; i < needed; i++) {
      p1dots += `<div class="frame-dot ${i < s.player1.frames ? 'won' : ''}"></div>`;
      p2dots += `<div class="frame-dot ${i < s.player2.frames ? 'won' : ''}"></div>`;
    }
    document.getElementById('p1-dots').innerHTML = p1dots;
    document.getElementById('p2-dots').innerHTML = p2dots;

    // Match winner overlay
    if (s.matchWinner) {
      const winnerName = s[`player${s.matchWinner}`].name;
      document.getElementById('winner-name').textContent = winnerName;
      document.getElementById('winner-overlay').style.display = 'flex';
      startConfetti();
    } else {
      document.getElementById('winner-overlay').style.display = 'none';
    }
  }

  function startConfetti() {
    const canvas = document.getElementById('confetti');
    canvas.style.display = 'block';
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const particles = Array.from({length: 120}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      w: Math.random() * 10 + 5,
      h: Math.random() * 5 + 3,
      color: ['#d4a843','#c0392b','#27ae60','#2980b9','#e91e8c','#f1c40f'][Math.floor(Math.random()*6)],
      speed: Math.random() * 3 + 1,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 4
    }));
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle * Math.PI / 180);
        ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
        p.y += p.speed; p.angle += p.spin;
        if (p.y > canvas.height) p.y = -20;
      });
      requestAnimationFrame(draw);
    }
    draw();
  }
</script>
<style>
  :root {
    --cloth: #0e3322;
    --gold: #c9a227;
    --gold2: #f0c040;
    --dark: #060f0a;
    --surface: rgba(255,255,255,0.04);
    --text: #f0ece0;
    --sub: rgba(240,236,224,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(ellipse at center, #0f2d1a 0%, #060f0a 100%);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    height: 100vh; width: 100vw;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  /* Decorative cloth texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px
    ), repeating-linear-gradient(
      90deg, transparent, transparent 2px, rgba(255,255,255,0.005) 2px, rgba(255,255,255,0.005) 4px
    );
    pointer-events: none;
  }

  #waiting {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    color: var(--sub); text-align: center;
  }
  #waiting h2 { font-family: 'Bebas Neue', cursive; font-size: 3rem; color: var(--gold); letter-spacing: 3px; }
  .pulse-ball { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #e74c3c, #6e1a12); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.7} }

  #scoreboard {
    display: none;
    width: min(1200px, 98vw);
    grid-template-rows: auto auto 1fr auto auto;
    gap: 0;
    height: 98vh;
  }

  /* Top bar */
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 24px;
    border-bottom: 1px solid rgba(201,162,39,0.3);
    background: rgba(0,0,0,0.3);
  }
  .tournament-title {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    letter-spacing: 4px; color: var(--gold);
  }
  .frame-label {
    font-size: clamp(0.7rem, 1.5vw, 1rem);
    color: var(--sub); letter-spacing: 2px; text-transform: uppercase;
  }
  .live-dot {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.75rem; color: #e74c3c; letter-spacing: 2px;
  }
  .live-dot::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: #e74c3c; animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* Main score area */
  .main-scores {
    display: grid;
    grid-template-columns: 1fr 180px 1fr;
    align-items: center;
    padding: 20px 24px;
    flex: 1;
    gap: 16px;
  }

  .player-block { display: flex; flex-direction: column; gap: 8px; }
  .player-block.left { text-align: left; }
  .player-block.right { text-align: right; }

  .player-name {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2rem, 5vw, 4rem);
    letter-spacing: 3px;
    line-height: 1;
    color: var(--text);
    text-shadow: 0 0 40px rgba(201,162,39,0.3);
  }
  .player-name.active { color: var(--gold2); text-shadow: 0 0 30px rgba(240,192,64,0.5); }

  .turn-arrow { font-size: 1.5rem; transition: opacity 0.3s; }

  .frame-score {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(4rem, 10vw, 8rem);
    line-height: 1;
    color: var(--gold);
    text-shadow: 0 0 60px rgba(201,162,39,0.4);
  }

  .pts-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(1.5rem, 4vw, 3rem);
    font-weight: 300;
    color: var(--text);
    letter-spacing: 1px;
  }

  .frame-dots { display: flex; gap: 6px; margin-top: 4px; }
  .player-block.right .frame-dots { justify-content: flex-end; }
  .frame-dot {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid rgba(201,162,39,0.4);
    background: transparent; transition: background 0.3s;
  }
  .frame-dot.won { background: var(--gold); border-color: var(--gold); }

  /* VS center */
  .vs-center {
    display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center;
  }
  .vs-frames-label { font-size: 0.7rem; color: var(--sub); letter-spacing: 2px; text-transform: uppercase; }
  .vs-dash {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(3rem, 6vw, 5rem);
    color: rgba(255,255,255,0.15);
    line-height: 1;
  }
  .vs-pts-label { font-size: 0.7rem; color: var(--sub); letter-spacing: 2px; text-transform: uppercase; }

  /* Break display */
  .break-section {
    padding: 12px 24px;
    background: rgba(0,0,0,0.3);
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center; gap: 24px;
    transition: opacity 0.3s;
    position: relative;
  }
  #century-glow {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(201,162,39,0.15), transparent 70%);
    pointer-events: none; opacity: 0; transition: opacity 0.5s;
    animation: century-pulse 1.5s ease-in-out infinite;
  }
  @keyframes century-pulse { 0%,100%{opacity:0.7} 50%{opacity:0.3} }

  .break-label-text {
    font-size: 0.75rem; color: var(--sub); letter-spacing: 2px; text-transform: uppercase;
    text-align: center;
  }
  #break-label-name { display: block; font-size: 0.9rem; color: var(--gold); margin-bottom: 2px; }
  .break-val {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(3rem, 7vw, 5.5rem);
    color: white; line-height: 1;
    text-shadow: 0 0 30px rgba(255,255,255,0.3);
  }
  #break-balls {
    display: flex; flex-wrap: wrap; gap: 6px; max-width: 300px; justify-content: center;
  }
  .ball {
    width: clamp(26px, 3.5vw, 36px); height: clamp(26px, 3.5vw, 36px);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: clamp(0.6rem, 1vw, 0.75rem); font-weight: bold; color: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
    position: relative; overflow: hidden; flex-shrink: 0;
  }
  .ball::after { content:''; position:absolute; top:15%; left:20%; width:35%; height:25%; background:rgba(255,255,255,0.25); border-radius:50%; transform:rotate(-30deg); }
  .ball span { position: relative; z-index: 1; }
  .ball-red { background: radial-gradient(circle at 35% 35%, #e74c3c, #7b241c); }
  .ball-yellow { background: radial-gradient(circle at 35% 35%, #f7dc6f, #b7950b); color:#333; }
  .ball-green { background: radial-gradient(circle at 35% 35%, #52be80, #1e6e3a); }
  .ball-brown { background: radial-gradient(circle at 35% 35%, #a0714f, #5d4037); }
  .ball-blue { background: radial-gradient(circle at 35% 35%, #5dade2, #1a5276); }
  .ball-pink { background: radial-gradient(circle at 35% 35%, #f06292, #b71c5d); }
  .ball-black { background: radial-gradient(circle at 35% 35%, #4a4a4a, #0a0a0a); border: 1px solid #444; }

  /* Bottom bar */
  .bottom-bar {
    padding: 10px 24px;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid rgba(201,162,39,0.2);
    background: rgba(0,0,0,0.4);
  }
  .reds-section { display: flex; flex-direction: column; gap: 4px; }
  #reds-dots { display: flex; gap: 4px; flex-wrap: wrap; max-width: 200px; }
  .red-dot { width: 10px; height: 10px; border-radius: 50%; transition: all 0.3s; }
  .red-on { background: #c0392b; box-shadow: 0 0 6px rgba(192,57,43,0.5); }
  .red-off { background: rgba(255,255,255,0.1); }
  #reds-count { font-size: 0.65rem; color: var(--sub); letter-spacing: 1px; margin-top: 2px; }

  .logo-area { text-align: center; }
  .logo-text { font-family: 'Bebas Neue', cursive; font-size: 0.9rem; letter-spacing: 3px; color: rgba(201,162,39,0.4); }

  /* Winner overlay */
  #winner-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.85);
    flex-direction: column; align-items: center; justify-content: center; gap: 24px;
    text-align: center;
  }
  .winner-text { font-family: 'Bebas Neue', cursive; font-size: 1.5rem; color: var(--gold); letter-spacing: 4px; }
  .winner-name-big { font-family: 'Bebas Neue', cursive; font-size: clamp(4rem, 10vw, 8rem); color: white; letter-spacing: 6px; text-shadow: 0 0 80px rgba(201,162,39,0.8); }
  .winner-sub { font-family: 'Bebas Neue', cursive; font-size: 2rem; color: var(--gold); letter-spacing: 3px; }
  .trophy-icon { font-size: 5rem; animation: trophy-bounce 1s ease-in-out infinite; }
  @keyframes trophy-bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

  #confetti { display: none; position: fixed; inset: 0; pointer-events: none; z-index: 99; }
</style>
</head>
<body>

<div id="waiting">
  <div class="pulse-ball"></div>
  <h2>Awaiting Match</h2>
  <p style="font-family:'Barlow Condensed';letter-spacing:1px;color:rgba(240,236,224,0.4)">Open setup.html to begin</p>
</div>

<div id="scoreboard">
  <!-- Top bar -->
  <div class="top-bar">
    <div class="tournament-title" id="tournament">Snooker</div>
    <div class="frame-label" id="frame-label">Frame 1</div>
    <div class="live-dot">LIVE</div>
  </div>

  <!-- Main scores -->
  <div class="main-scores">
    <!-- Player 1 -->
    <div class="player-block left">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="turn-arrow" id="p1-turn">▶</div>
        <div class="player-name" id="p1-name">Player 1</div>
      </div>
      <div class="pts-score" id="p1-pts">0</div>
      <div class="frame-dots" id="p1-dots"></div>
    </div>

    <!-- Center VS -->
    <div class="vs-center">
      <div class="vs-frames-label">Frames</div>
      <div style="display:flex;align-items:center;gap:4px">
        <div class="frame-score" id="p1-frame-score">0</div>
        <div class="vs-dash">–</div>
        <div class="frame-score" id="p2-frame-score">0</div>
      </div>
      <div class="vs-pts-label">Points</div>
    </div>

    <!-- Player 2 -->
    <div class="player-block right">
      <div style="display:flex;align-items:center;justify-content:flex-end;gap:10px">
        <div class="player-name" id="p2-name">Player 2</div>
        <div class="turn-arrow" id="p2-turn">◀</div>
      </div>
      <div class="pts-score" id="p2-pts">0</div>
      <div class="frame-dots" id="p2-dots" style="justify-content:flex-end"></div>
    </div>
  </div>

  <!-- Break section -->
  <div class="break-section" id="break-display">
    <div id="century-glow"></div>
    <div>
      <div class="break-label-text"><span id="break-label-name">Break</span>Current Break</div>
    </div>
    <div class="break-val" id="break-value">0</div>
    <div id="break-balls"></div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="reds-section">
      <div id="reds-dots"></div>
      <div id="reds-count">15 reds remaining</div>
    </div>
    <div class="logo-area">
      <div class="logo-text">Snooker Scoring System</div>
    </div>
  </div>
</div>

<!-- Winner overlay -->
<div id="winner-overlay">
  <div class="trophy-icon">🏆</div>
  <div class="winner-text">Match Winner</div>
  <div class="winner-name-big" id="winner-name">–</div>
  <div class="winner-sub">Wins the Match</div>
</div>

<canvas id="confetti"></canvas>
</body>
</html>
